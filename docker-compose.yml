services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - finsight-postgres:/var/lib/postgresql/data

volumes:
  finsight-postgres:
